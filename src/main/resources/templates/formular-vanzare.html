<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>EliteAuto | Tranzacție Nouă</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; color: #2c3e50; }
    .navbar-custom { background: #ffffff; border-bottom: 1px solid #e0e6ed; padding: 0.8rem 0; }
    .brand-logo { font-weight: 700; color: #1a252f; font-size: 1.4rem; letter-spacing: -0.5px; }
    .brand-logo i { color: #3498db; }
    .card { border-radius: 10px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .form-label { font-weight: 500; color: #495057; font-size: 0.9rem; }
    .form-control, .form-select { border-radius: 8px; border: 1px solid #ced4da; padding: 0.6rem 1rem; }
    .form-control:focus, .form-select:focus { border-color: #3498db; box-shadow: 0 0 0 0.25rem rgba(52, 152, 219, 0.1); }
    .section-title { font-size: 1.1rem; font-weight: 600; color: #2c3e50; margin-bottom: 1.5rem; border-bottom: 2px solid #e0e6ed; padding-bottom: 0.5rem; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top mb-4">
  <div class="container">
    <a class="navbar-brand brand-logo" href="/"><i class="fas fa-car-side me-2"></i>EliteAuto</a>
    <div class="d-flex align-items-center">
      <a class="btn btn-light rounded-pill border-0" href="/logout">
        <img src="https://ui-avatars.com/api/?name=Admin&background=3498db&color=fff" class="rounded-circle me-2" width="28">
        <span class="fw-medium text-dark small">Admin</span>
      </a>
    </div>
  </div>
</nav>

<div class="container pb-5">
  <div class="d-flex align-items-center mb-4">
    <a href="/" class="btn btn-light text-secondary me-3"><i class="fas fa-arrow-left"></i> Înapoi</a>
    <h4 class="m-0 fw-bold">Procesare Tranzacție Nouă</h4>
  </div>

  <form th:action="@{/proceseaza-vanzare}" method="post">
    <div class="row g-4">

      <div class="col-lg-6">
        <div class="card p-4 h-100">
          <h5 class="section-title"><i class="fas fa-file-invoice-dollar me-2 text-primary"></i> 1. Detalii Tranzacție</h5>

          <div class="mb-4">
            <label class="form-label">Selectează Vehiculul (Din Stoc)</label>
            <select name="masina.id" class="form-select" required>
              <option value="">-- Alege o mașină --</option>
              <option th:each="m : ${masini}" th:value="${m.id}"
                      th:text="${m.marca} + ' ' + ${m.model} + ' (' + ${m.pret} + ' €)'"></option>
            </select>
          </div>

          <div class="mb-4">
            <label class="form-label">Preț Final Negociat (€)</label>
            <div class="input-group">
              <span class="input-group-text bg-light text-success fw-bold">€</span>
              <input type="number" step="0.01" name="pretFinal" class="form-control form-control-lg text-success fw-bold" required>
            </div>
            <div class="form-text">Prețul final poate fi diferit de cel de listare în urma negocierilor.</div>
          </div>

          <div class="mb-3">
            <label class="form-label">Metodă de Plată</label>
            <select name="modalitatePlata" class="form-select" required>
              <option value="Transfer Bancar">Transfer Bancar</option>
              <option value="Cash">Cash</option>
              <option value="Leasing">Leasing (Finanțare)</option>
            </select>
          </div>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="card p-4 h-100">
          <h5 class="section-title"><i class="fas fa-user-tag me-2 text-primary"></i> 2. Date Client</h5>

          <div class="form-check form-switch mb-4">
            <input class="form-check-input" type="checkbox" id="clientNouSwitch" name="isClientNou" value="true" onchange="toggleClientForm()">
            <label class="form-check-label fw-bold text-primary" for="clientNouSwitch">Acesta este un client nou</label>
          </div>

          <div id="divClientExistent" class="mb-3">
            <label class="form-label">Alege Client din Bază</label>
            <select name="clientExistentId" class="form-select" id="selectClientExistent">
              <option value="">-- Alege client --</option>
              <option th:each="c : ${clienti}" th:value="${c.id}"
                      th:text="${c.nume} + ' ' + ${c.prenume} + ' (' + ${c.cnp} + ')'"></option>
            </select>
          </div>

          <div id="divClientNou" style="display:none;" class="bg-light p-3 rounded border">
            <h6 class="fw-bold mb-3 small text-muted text-uppercase">Înregistrare Client Nou</h6>
            <div class="row g-2">
              <div class="col-md-6 mb-2">
                <label class="form-label small">Nume</label>
                <input type="text" name="clientNou.nume" class="form-control form-control-sm" id="cnNume">
              </div>
              <div class="col-md-6 mb-2">
                <label class="form-label small">Prenume</label>
                <input type="text" name="clientNou.prenume" class="form-control form-control-sm" id="cnPrenume">
              </div>
              <div class="col-md-6 mb-2">
                <label class="form-label small">CNP</label>
                <input type="text" name="clientNou.cnp" class="form-control form-control-sm font-monospace" id="cnCNP">
              </div>
              <div class="col-md-6 mb-2">
                <label class="form-label small">Telefon</label>
                <input type="text" name="clientNou.telefon" class="form-control form-control-sm" id="cnTel">
              </div>
              <div class="col-md-12 mb-2">
                <label class="form-label small">Adresă Email</label>
                <input type="email" name="clientNou.email" class="form-control form-control-sm">
              </div>
              <div class="col-md-12">
                <label class="form-label small">Adresă Domiciliu</label>
                <input type="text" name="clientNou.adresa" class="form-control form-control-sm">
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 mt-4">
        <div class="card p-3 bg-white">
          <button type="submit" class="btn btn-success btn-lg w-100 fw-bold">
            <i class="fas fa-check-circle me-2"></i> Finalizează Tranzacția
          </button>
        </div>
      </div>

    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Logică simplă de JavaScript pentru a ascunde/arăta formularul de client nou
  function toggleClientForm() {
      const isNou = document.getElementById('clientNouSwitch').checked;
      const divExistent = document.getElementById('divClientExistent');
      const divNou = document.getElementById('divClientNou');
      const selectExistent = document.getElementById('selectClientExistent');

      // Elementele obligatorii pentru client nou
      const reqFields = ['cnNume', 'cnPrenume', 'cnCNP', 'cnTel'];

      if(isNou) {
          divExistent.style.display = 'none';
          divNou.style.display = 'block';
          selectExistent.removeAttribute('required');
          reqFields.forEach(id => document.getElementById(id).setAttribute('required', 'required'));
      } else {
          divExistent.style.display = 'block';
          divNou.style.display = 'none';
          selectExistent.setAttribute('required', 'required');
          reqFields.forEach(id => document.getElementById(id).removeAttribute('required'));
      }
  }
  // Initialize state
  toggleClientForm();
</script>
</body>
</html>
