<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>EliteAuto | Echipa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; color: #2c3e50; }
    .navbar-custom { background: #ffffff; border-bottom: 1px solid #e0e6ed; padding: 0.8rem 0; }
    .brand-logo { font-weight: 700; color: #1a252f; font-size: 1.4rem; letter-spacing: -0.5px; }
    .brand-logo i { color: #3498db; }
    .nav-pills .nav-link { color: #5c6bc0; font-weight: 500; padding: 0.6rem 1rem; border-radius: 6px; margin-right: 5px; }
    .nav-pills .nav-link:hover { background-color: #f0f4f8; }
    .nav-pills .nav-link.active { background-color: #e1effe; color: #2980b9; font-weight: 600; }
    .card { border-radius: 10px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.03); }
    .table > :not(caption) > * > * { padding: 1rem 1.2rem; vertical-align: middle; border-bottom-color: #f0f2f5; }
    .btn-action { border-radius: 6px; padding: 0.35rem 0.6rem; transition: transform 0.1s; }
    .btn-action:hover { transform: scale(1.05); }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top">
  <div class="container">
    <a class="navbar-brand brand-logo text-decoration-none" href="/"><i class="fas fa-car-side me-2"></i>EliteAuto</a>
    <div class="d-flex align-items-center">
      <a class="btn btn-light rounded-pill border-0" href="/logout">
        <span class="fw-medium text-dark small" th:text="${userLogat != null ? userLogat.nume : 'Admin'}">Admin</span>
      </a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <ul class="nav nav-pills">
      <li class="nav-item"><a class="nav-link" href="/"><i class="fas fa-th-large me-2"></i>Inventar</a></li>
      <li class="nav-item"><a class="nav-link" href="/istoric-vanzari"><i class="fas fa-chart-pie me-2"></i>Rapoarte</a></li>
      <li class="nav-item"><a class="nav-link active" href="/angajati"><i class="fas fa-users-cog me-2"></i>Echipă</a></li>
    </ul>
    <div class="d-flex gap-2">
      <a href="/angajati/adaugare" class="btn btn-dark fw-medium px-4 shadow-sm" style="border-radius: 8px;">
        <i class="fas fa-user-plus me-2"></i> Înregistrează Angajat
      </a>
    </div>
  </div>

  <div class="card">
    <div class="card-header bg-white py-3 border-bottom-0">
      <h5 class="m-0 fw-bold text-dark">Personal EliteAuto</h5>
    </div>
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="bg-light text-uppercase" style="font-size: 0.75rem; color: #7f8c8d;">
        <tr>
          <th>Angajat</th>
          <th>Email Contact</th>
          <th>Funcție</th>
          <th>Data Angajării</th>
          <th class="text-end pe-4">Acțiuni</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="a : ${angajati}">
          <td>
            <div class="d-flex align-items-center">
              <img th:src="'https://ui-avatars.com/api/?name=' + ${a.nume} + '+' + ${a.prenume} + '&background=random'" class="rounded-circle me-3" width="35">
              <div class="fw-bold text-dark" th:text="${a.nume} + ' ' + ${a.prenume}"></div>
            </div>
          </td>
          <td class="text-muted" th:text="${a.email}"></td>
          <td><span class="badge bg-primary bg-opacity-10 text-primary border border-primary-subtle" th:text="${a.functie}"></span></td>
          <td class="text-muted" th:text="${a.dataAngajare}"></td>
          <td class="text-end pe-4">
            <a th:href="@{/angajati/editare/{id}(id=${a.id})}" class="btn btn-light border btn-action me-1 text-primary" title="Editează">
              <i class="fas fa-pen"></i>
            </a>
            <a th:href="@{/angajati/stergere/{id}(id=${a.id})}" class="btn btn-light border btn-action text-danger" title="Șterge"
               onclick="return confirm('Sigur dorești să ștergi acest angajat din sistem?');">
              <i class="fas fa-trash"></i>
            </a>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
