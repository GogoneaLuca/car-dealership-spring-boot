<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EliteAuto | Date Angajat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Inter', sans-serif; color: #2c3e50; }
        .navbar-custom { background: #ffffff; border-bottom: 1px solid #e0e6ed; padding: 0.8rem 0; }
        .brand-logo { font-weight: 700; color: #1a252f; font-size: 1.4rem; letter-spacing: -0.5px; }
        .brand-logo i { color: #3498db; }
        .card { border-radius: 10px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-label { font-weight: 500; color: #495057; font-size: 0.9rem; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #ced4da; padding: 0.6rem 1rem; }
        .form-control:focus, .form-select:focus { border-color: #3498db; box-shadow: 0 0 0 0.25rem rgba(52, 152, 219, 0.1); }
        .is-invalid { border-color: #dc3545 !important; background-image: none; }
        .invalid-feedback { font-size: 0.8rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom sticky-top mb-4">
    <div class="container">
        <a class="navbar-brand brand-logo text-decoration-none" href="/"><i class="fas fa-car-side me-2"></i>EliteAuto</a>
        <div class="d-flex align-items-center">
            <a class="btn btn-light rounded-pill border-0" href="/logout">
                <span class="fw-medium text-dark small" th:text="${userLogat != null ? userLogat.nume : 'Admin'}">Admin</span>
            </a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="d-flex align-items-center mb-4">
        <a href="/angajati" class="btn btn-light text-secondary me-3"><i class="fas fa-arrow-left"></i> Înapoi la Echipă</a>
        <h4 class="m-0 fw-bold" th:text="${angajat.id == null ? 'Înregistrare Angajat Nou' : 'Editează Angajatul'}"></h4>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card p-4 p-md-5">

                <form th:action="@{/angajati/salvare}" th:object="${angajat}" method="POST" novalidate>
                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{dataAngajare}">

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Nume</label>
                            <input type="text" class="form-control" th:field="*{nume}" placeholder="ex: Popescu"
                                   th:classappend="${#fields.hasErrors('nume')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:errors="*{nume}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Prenume</label>
                            <input type="text" class="form-control" th:field="*{prenume}" placeholder="ex: Ion"
                                   th:classappend="${#fields.hasErrors('prenume')} ? 'is-invalid' : ''">
                            <div class="invalid-feedback" th:errors="*{prenume}"></div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Adresă Email</label>
                        <input type="email" class="form-control" th:field="*{email}" placeholder="nume@eliteauto.ro"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:errors="*{email}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Parolă Sistem</label>
                        <input type="text" class="form-control" th:field="*{parola}" placeholder="Parolă securizată"
                               th:classappend="${#fields.hasErrors('parola')} ? 'is-invalid' : ''">
                        <div class="invalid-feedback" th:errors="*{parola}"></div>
                    </div>

                    <div class="row g-3 mb-4">
                        <div class="col-md-6">
                            <label class="form-label">Funcție</label>
                            <select class="form-select" th:field="*{functie}">
                                <option value="Agent Vanzari">Agent Vânzări</option>
                                <option value="Manager">Manager</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Salariu (€)</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0">€</span>
                                <input type="number" step="0.01" class="form-control border-start-0 ps-0" th:field="*{salariu}" placeholder="ex: 2500"
                                       th:classappend="${#fields.hasErrors('salariu')} ? 'is-invalid' : ''">
                                <div class="invalid-feedback" th:errors="*{salariu}"></div>
                            </div>
                        </div>
                    </div>

                    <hr class="my-4 text-muted">
                    <div class="d-flex justify-content-end gap-2">
                        <a href="/angajati" class="btn btn-light px-4 fw-medium">Anulează</a>
                        <button type="submit" class="btn btn-primary px-5 fw-medium"><i class="fas fa-save me-2"></i>Salvează</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
