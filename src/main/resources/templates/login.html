<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>EliteAuto | Autentificare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Aici punem imaginea pe tot fundalul ecranului cu filtrul negru transparent */
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.85)),
                        url('https://images.unsplash.com/photo-1560958089-b8a1929cea89?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        /* Fereastra albă din mijloc */
        .login-box {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }

        .brand-header { text-align: center; margin-bottom: 2rem; }
        .brand-header i { color: #0d6efd; font-size: 2rem; margin-bottom: 10px; }
        .brand-header h3 { font-weight: 700; color: #1e293b; margin: 0; }

        .form-control { border-radius: 8px; padding: 0.8rem 1rem; border: 1px solid #cbd5e1; background-color: #f8fafc;}
        .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.15); background-color: #fff;}
        .input-group-text { background-color: #f8fafc; border: 1px solid #cbd5e1; color: #64748b; }

        .btn-primary { padding: 0.8rem; border-radius: 8px; font-weight: 600; background-color: #0d6efd; border: none; transition: 0.2s;}
        .btn-primary:hover { background-color: #0b5ed7; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="login-box">
    <div class="brand-header">
        <i class="fas fa-car-side"></i>
        <h3>EliteAuto</h3>
        <p class="text-muted small mt-1">Autentificare sistem gestiune</p>
    </div>

    <div th:if="${eroare}" class="alert alert-danger py-2 px-3 small fw-medium rounded-3 mb-4 text-center">
        <i class="fas fa-exclamation-triangle me-1"></i> <span th:text="${eroare}"></span>
    </div>

    <form action="/login" method="post">
        <div class="mb-3">
            <label class="form-label text-secondary small fw-bold">Email Angajat</label>
            <div class="input-group">
                <span class="input-group-text border-end-0"><i class="fas fa-envelope"></i></span>
                <input type="email" name="email" class="form-control border-start-0 ps-0" placeholder="admin@eliteauto.ro" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label text-secondary small fw-bold">Parolă</label>
            <div class="input-group">
                <span class="input-group-text border-end-0"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2 shadow-sm">
            Conectare
        </button>
    </form>
</div>

</body>
</html>
